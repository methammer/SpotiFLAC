name: Check Upstream Changes

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/afkarxyz/SpotiFLAC.git
          git fetch upstream --quiet

      - name: Check for changes in tracked files
        id: check
        run: |
          # ── Fichiers PURE UPSTREAM ──────────────────────────────────────────
          # Existent dans upstream ET chez nous, peu ou pas modifiés.
          # deezer.go / downloader.go / uploader.go / spotify.go exclus intentionnellement.
          TRACKED_FILES=(
            "backend/tidal.go"
            "backend/amazon.go"
            "backend/qobuz.go"
            "backend/metadata.go"
            "backend/musicbrainz.go"
            "backend/songlink.go"
            "backend/cover.go"
            "backend/lyrics.go"
          )

          # ── Fichiers NEW UPSTREAM ───────────────────────────────────────────
          # Existent dans upstream mais pas (ou différemment nommés) chez nous.
          # Intégration manuelle uniquement.
          NEW_UPSTREAM_FILES=(
            "backend/spotfetch.go"
          )

          # ── Fichiers MIXED ──────────────────────────────────────────────────
          MIXED_FILES=(
            "app.go"
            "go.mod"
          )

          UPSTREAM_HEAD=$(git rev-parse upstream/main)
          UPSTREAM_DATE=$(git log -1 --format="%ci" upstream/main)
          UPSTREAM_MSG=$(git log -1 --format="%s" upstream/main)
          COMMON_ANCESTOR=$(git merge-base HEAD upstream/main)
          COMMIT_COUNT=$(git rev-list --count "${COMMON_ANCESTOR}..upstream/main")

          echo "upstream_head=${UPSTREAM_HEAD:0:8}" >> $GITHUB_OUTPUT
          echo "upstream_date=${UPSTREAM_DATE:0:10}" >> $GITHUB_OUTPUT
          echo "upstream_msg=${UPSTREAM_MSG}" >> $GITHUB_OUTPUT
          echo "commit_count=${COMMIT_COUNT}" >> $GITHUB_OUTPUT

          if [[ "$COMMIT_COUNT" -eq 0 ]]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          CHANGED_FILES=""
          UNCHANGED_FILES=""
          MIXED_CHANGED=""
          NEW_FILES_STATUS=""

          for FILE in "${TRACKED_FILES[@]}"; do
            if ! git show "upstream/main:${FILE}" &>/dev/null 2>&1; then
              CHANGED_FILES="${CHANGED_FILES}\n- \`${FILE}\` ⚠️ **disparu de upstream** (supprimé ou renommé ?)"
              continue
            fi
            DIFF=$(git diff HEAD upstream/main -- "${FILE}" 2>/dev/null || true)
            if [[ -n "$DIFF" ]]; then
              ADDED=$(echo "$DIFF" | grep -c '^+[^+]' || true)
              REMOVED=$(echo "$DIFF" | grep -c '^-[^-]' || true)
              CHANGED_FILES="${CHANGED_FILES}\n- \`${FILE}\` (+${ADDED} / -${REMOVED} lignes)"
            else
              UNCHANGED_FILES="${UNCHANGED_FILES}\n- \`${FILE}\` ✓"
            fi
          done

          for FILE in "${NEW_UPSTREAM_FILES[@]}"; do
            if git show "upstream/main:${FILE}" &>/dev/null 2>&1; then
              LAST_COMMIT=$(git log upstream/main --oneline -1 -- "${FILE}" 2>/dev/null || true)
              NEW_FILES_STATUS="${NEW_FILES_STATUS}\n- \`${FILE}\` — ${LAST_COMMIT}"
            fi
          done

          for FILE in "${MIXED_FILES[@]}"; do
            if git show "upstream/main:${FILE}" &>/dev/null 2>&1; then
              DIFF=$(git diff HEAD upstream/main -- "${FILE}" 2>/dev/null || true)
              if [[ -n "$DIFF" ]]; then
                ADDED=$(echo "$DIFF" | grep -c '^+[^+]' || true)
                REMOVED=$(echo "$DIFF" | grep -c '^-[^-]' || true)
                MIXED_CHANGED="${MIXED_CHANGED}\n- \`${FILE}\` (+${ADDED} / -${REMOVED} lignes)"
              fi
            fi
          done

          RECENT_COMMITS=$(git log "${COMMON_ANCESTOR}..upstream/main" --oneline | head -15)

          cat > /tmp/issue_body.md << MDEOF
          ## 🔄 Changements détectés dans [afkarxyz/SpotiFLAC](https://github.com/afkarxyz/SpotiFLAC)

          **Upstream HEAD :** \`${UPSTREAM_HEAD:0:8}\` — ${UPSTREAM_DATE:0:10}
          **Dernier commit :** ${UPSTREAM_MSG}
          **Commits non intégrés :** ${COMMIT_COUNT}

          ---

          ### Commits upstream récents
          \`\`\`
          ${RECENT_COMMITS}
          \`\`\`

          ---

          ### 🔴 Fichiers PURE UPSTREAM modifiés
          > Checkout direct si pas de conflits avec notre code

          $(echo -e "$CHANGED_FILES")

          ### ✅ Fichiers PURE UPSTREAM inchangés
          $(echo -e "$UNCHANGED_FILES")

          ### 🟡 Fichiers MIXED modifiés
          > Inspection manuelle hunk par hunk requise

          $(echo -e "$MIXED_CHANGED")

          ### 🔵 Fichiers NEW UPSTREAM à surveiller
          > Existent upstream mais pas localement sous ce nom — intégration manuelle

          $(echo -e "$NEW_FILES_STATUS")

          > **Note :** \`backend/spotfetch.go\` upstream = notre \`backend/spotify_metadata.go\`
          > Comparer les fonctions \`Filter*\` si des changements ont eu lieu.

          ---

          ### Actions recommandées

          \`\`\`bash
          # 1. Fetch et lancer le script local
          git fetch upstream
          ./check-upstream.sh --verbose

          # 2. Voir le diff d'un fichier
          git diff HEAD upstream/main -- backend/tidal.go | less

          # 3. Intégrer un fichier pure upstream
          git checkout upstream/main -- backend/FICHIER.go
          git commit -m "chore: sync backend/FICHIER.go from upstream $(date +%Y-%m-%d)"

          # 4. Voir un fichier upstream sans l'appliquer
          git show upstream/main:backend/spotfetch.go | less
          \`\`\`

          ---
          *Issue créée automatiquement — [upstream-check.yml](../.github/workflows/upstream-check.yml)*
          MDEOF

          echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Create GitHub Issue if changes detected
        if: steps.check.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/issue_body.md', 'utf8');

            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'upstream-sync'
            });

            const upstreamHead = '${{ steps.check.outputs.upstream_head }}';
            const alreadyExists = existingIssues.data.some(issue =>
              issue.title.includes(upstreamHead)
            );

            if (alreadyExists) {
              console.log('Issue already exists for this upstream commit, skipping.');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Upstream Sync] ${{ steps.check.outputs.commit_count }} commits — upstream/${{ steps.check.outputs.upstream_head }} (${{ steps.check.outputs.upstream_date }})`,
              body: body,
              labels: ['upstream-sync']
            });

      - name: Summary
        run: |
          if [[ "${{ steps.check.outputs.has_changes }}" == "false" ]]; then
            echo "✅ Aucun changement upstream. Tout est à jour."
          else
            echo "⚠️ Changements détectés. Issue GitHub créée."
            echo "Commits non intégrés : ${{ steps.check.outputs.commit_count }}"
          fi